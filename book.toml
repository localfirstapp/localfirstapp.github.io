[book]
authors = ["jiacai2050"]
language = "zh-CN"
src = "src"
title = "LocalFirstApp"
description = "Local-first 软件精选目录与实践指南"

[output.html]
git-repository-url = "https://github.com/localfirstapp/localfirstapp.github.io"
git-repository-icon = "fab-github"
edit-url-template = "https://github.com/localfirstapp/localfirstapp.github.io/edit/main/{path}"
default-theme = "light"
preferred-dark-theme = "navy"
no-section-label = true

[output.html.search]
limit-results = 20
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
copy-js = true

[output.html.fold]
enable = true
level = 1

[output.html.print]
enable = true
